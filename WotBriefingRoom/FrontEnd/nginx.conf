server {
    listen 80;
    server_name _;

    root   /usr/share/nginx/html;
    index  index.html;

    # API proxy (compose hálózaton a backend szolgáltatásra)
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback – minden nem-létező fájl az index.html-re esik vissza
    location / { try_files $uri $uri/ /index.html; }

    # Ne cache-elje az indexet és a boot/SW fájlokat (hogy azonnal lásd a frissítést)
    location = /index.html { add_header Cache-Control "no-cache, no-store, must-revalidate" always; }
    location ~* ^/(service-worker(\.published)?\.js|service-worker-assets\.js|_framework/blazor\.boot\.json)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    # A styles css nincs hash-elve: külön no-cache
    location = /FrontEnd.styles.css { add_header Cache-Control "no-cache" always; }

    # Minden más statikus hosszú cache-sel
    location ~* \.(css|js|wasm|png|jpg|jpeg|gif|ico|svg)$ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html { root /usr/share/nginx/html; }
}
