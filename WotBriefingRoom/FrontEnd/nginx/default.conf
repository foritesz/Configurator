server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Same-origin API proxy a compose-beli backend felé
  location /api/ {
    proxy_pass http://backend:8080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # SPA fallback
  location / { try_files $uri $uri/ /index.html; }

  # No-cache az index/SW/boot fájlokra
  location = /index.html { add_header Cache-Control "no-cache, no-store, must-revalidate" always; }
  location ~* ^/(service-worker(\.published)?\.js|service-worker-assets\.js|_framework/blazor\.boot\.json)$ {
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
  }
  location = /FrontEnd.styles.css { add_header Cache-Control "no-cache" always; }

  # Statikusokra hosszú cache
  location ~* \.(css|js|wasm|png|jpg|jpeg|gif|ico|svg)$ {
    try_files $uri =404;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
  }
}
